<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeAndru Licita — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#F9FAFB;color:#111;min-height:100vh;display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid #E5E7EB;}
    .logo{font-size:18px;font-weight:900;color:#111;text-decoration:none;}
    .logo em{color:#16A34A;font-style:normal;}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
    .card{background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;}
    .card-title{font-size:24px;font-weight:800;color:#111;margin-bottom:6px;letter-spacing:-.4px;}
    .card-sub{font-size:13px;color:#6B7280;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:12px;font-weight:600;color:#111;margin-bottom:5px;display:block;}
    .form-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #E5E7EB;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#111;background:#fff;transition:border-color .15s;}
    .form-input:focus{outline:none;border-color:#16A34A;}
    .btn-submit{width:100%;padding:14px;border-radius:50px;background:#16A34A;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:8px;transition:all .15s;}
    .btn-submit:hover{background:#15803D;}
    .error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;font-size:13px;color:#DC2626;margin-bottom:16px;display:none;}
    .back-link{text-align:center;margin-top:16px;font-size:13px;color:#6B7280;}
    .back-link a{color:#16A34A;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">DeAndru<em>Licita</em></a>
  </nav>
  <div class="main">
    <div class="card">
      <div class="card-title">Bienvenido de vuelta</div>
      <div class="card-sub">Ingresa a tu cuenta para continuar</div>
      <div class="error-msg" id="error-msg">Correo o contraseña incorrectos. Inténtalo de nuevo.</div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="email" placeholder="tucorreo@hotmail.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn-submit" onclick="doLogin()">Ingresar →</button>
      <div class="back-link">¿No tienes cuenta? <a href="register.html">Regístrate gratis</a></div>
    </div>
  </div>
  <script>
    // CONFIGURACIÓN ADMIN — solo cambia estos dos valores
    const ADMIN_EMAIL = "andrew-s-30@hotmail.com"; // <-- pon tu correo real aquí
    const ADMIN_PASSWORD = "DeAndru2025Admin!";   // <-- cambia esto por tu contraseña

    function doLogin() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Por favor completa todos los campos.';
        errorMsg.style.display = 'block';
        return;
      }

      // Verificar si es admin
      if (email === ADMIN_EMAIL.toLowerCase() && password === ADMIN_PASSWORD) {
        localStorage.setItem('dl_user', JSON.stringify({
          email: email,
          nombre: 'Andrew Gonzales',
          role: 'admin',
          plan: 'admin'
        }));
        window.location.href = 'admin.html';
        return;
      }

      // Verificar usuarios registrados
      const users = JSON.parse(localStorage.getItem('dl_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        localStorage.setItem('dl_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
        return;
      }

      errorMsg.textContent = 'Correo o contraseña incorrectos. Inténtalo de nuevo.';
      errorMsg.style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
