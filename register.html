<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeAndru Licita — Crear cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#F9FAFB;color:#111;min-height:100vh;display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid #E5E7EB;}
    .logo{font-size:18px;font-weight:900;color:#111;text-decoration:none;}
    .logo em{color:#16A34A;font-style:normal;}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
    .card{background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:36px 32px;width:100%;max-width:440px;}
    .free-badge{display:inline-block;background:#DCFCE7;color:#166534;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;}
    .card-title{font-size:24px;font-weight:800;color:#111;margin-bottom:6px;letter-spacing:-.4px;}
    .card-sub{font-size:13px;color:#6B7280;margin-bottom:24px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:12px;font-weight:600;color:#111;margin-bottom:5px;display:block;}
    .form-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #E5E7EB;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#111;background:#fff;transition:border-color .15s;}
    .form-input:focus{outline:none;border-color:#16A34A;}
    .form-select{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #E5E7EB;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#111;background:#fff;}
    .btn-submit{width:100%;padding:14px;border-radius:50px;background:#16A34A;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:8px;transition:all .15s;}
    .btn-submit:hover{background:#15803D;}
    .back-link{text-align:center;margin-top:16px;font-size:13px;color:#6B7280;}
    .back-link a{color:#16A34A;font-weight:600;text-decoration:none;}
    .success{display:none;text-align:center;padding:20px 0;}
    .success.show{display:block;}
    .success-icon{font-size:48px;margin-bottom:12px;}
    .success h3{font-size:20px;font-weight:800;margin-bottom:6px;}
    .success p{font-size:13px;color:#6B7280;line-height:1.6;}
    .error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;font-size:13px;color:#DC2626;margin-bottom:16px;display:none;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">DeAndru<em>Licita</em></a>
  </nav>
  <div class="main">
    <div class="card">
      <div id="form-section">
        <span class="free-badge">30 días gratis</span>
        <div class="card-title">Crea tu cuenta gratis</div>
        <div class="card-sub">Sin tarjeta de crédito. Listo en 2 minutos.</div>
        <div class="error-msg" id="error-msg"></div>
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input class="form-input" type="text" id="nombre" placeholder="Ej: Carlos Mamani">
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input class="form-input" type="email" id="email" placeholder="tucorreo@gmail.com">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp (para tus alertas)</label>
          <input class="form-input" type="tel" id="wsp" placeholder="+51 987 654 321">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label class="form-label">¿Qué vende tu empresa?</label>
          <select class="form-select" id="rubro">
            <option value="">Selecciona tu rubro</option>
            <option>Limpieza y mantenimiento</option>
            <option>Tecnología y cómputo</option>
            <option>Alimentos y catering</option>
            <option>Construcción y obras</option>
            <option>Consultoría y servicios</option>
            <option>Materiales y suministros</option>
            <option>Otro rubro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">¿En qué región operas?</label>
          <select class="form-select" id="region">
            <option value="">Selecciona tu región</option>
            <option>Lima Metropolitana</option>
            <option>Cusco</option>
            <option>Arequipa</option>
            <option>La Libertad</option>
            <option>Junín / Centro</option>
            <option>Otra región</option>
          </select>
        </div>
        <button class="btn-submit" onclick="doRegister()">Crear mi cuenta gratis →</button>
        <div class="back-link">¿Ya tienes cuenta? <a href="login.html">Ingresar</a></div>
      </div>
      <div class="success" id="success-section">
        <div class="success-icon">🎉</div>
        <h3>¡Ya estás dentro!</h3>
        <p>Cuenta creada exitosamente.<br>Redirigiendo a tu dashboard...</p>
      </div>
    </div>
  </div>
  <script>
    function doRegister() {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const wsp = document.getElementById('wsp').value.trim();
      const password = document.getElementById('password').value;
      const rubro = document.getElementById('rubro').value;
      const region = document.getElementById('region').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      if (!nombre || !email || !wsp || !password || !rubro || !region) {
        errorMsg.textContent = 'Por favor completa todos los campos.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        errorMsg.style.display = 'block';
        return;
      }

      const users = JSON.parse(localStorage.getItem('dl_users') || '[]');
      if (users.find(u => u.email === email)) {
        errorMsg.textContent = 'Este correo ya está registrado. Intenta ingresar.';
        errorMsg.style.display = 'block';
        return;
      }

      const newUser = {
        id: Date.now(),
        nombre, email, wsp, password, rubro, region,
        role: 'user',
        plan: 'trial',
        registro: new Date().toLocaleDateString('es-PE'),
        fecha_registro: new Date().toISOString()
      };

      users.push(newUser);
      localStorage.setItem('dl_users', JSON.stringify(users));
      localStorage.setItem('dl_user', JSON.stringify(newUser));

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').classList.add('show');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
    }
  </script>
</body>
</html>
